<ion-content>
  <!-- GRID как в React -->
  <div class="min-h-full !w-full grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8 justify-items-center">

    <!-- PHONE FRAME -->
    <div class="!w-full bg-white shadow-2xl overflow-hidden border border-slate-100">

      <!-- top bar -->
      <div class="h-6 flex items-center justify-center">
        <div class="w-24 h-1.5 rounded-full bg-slate-200 mt-2"></div>
      </div>

      <div class="px-4 pt-3 pb-6 bg-slate-50 min-h-[650px] !w-full">

        <!-- HEADER -->
        <div class="flex items-center justify-between mb-4">
          <div class="text-xl font-bold text-slate-900">Социальный</div>

          <div class="flex items-center gap-4">
            <!-- Колокольчик -->
            <button (click)="openNotifications()" class="relative p-2 -mr-1">
              <span class="text-3xl">🛎️</span>
              @if (unreadCount > 0) {
              <span class="absolute top-0 right-0 bg-red-500 text-white text-[10px] font-bold 
                             min-w-[18px] h-5 flex items-center justify-center rounded-full px-1">
                {{ unreadCount > 99 ? '99+' : unreadCount }}
              </span>
              }
            </button>

            <!-- Аватар -->
            <div class="w-10 h-10 rounded-2xl bg-[#173A7A] text-white flex items-center justify-center font-semibold"
              routerLink="/profile">
              С
            </div>
          </div>
        </div>

        <!-- BANNER -->
        <app-banner-slider></app-banner-slider>

        <!-- CATEGORIES -->
        <div class="flex items-center justify-between mb-3">
          <h3 class="font-bold text-slate-900">Категории</h3>
          <span class="text-sm text-[#173A7A] font-semibold cursor-pointer" (click)="goToCatalog('all')">
            Все
          </span>
        </div>

        <div class="grid grid-cols-4 gap-3 mb-6">
          <div *ngFor="let c of categories"
            class="bg-white rounded-2xl p-3 text-center shadow-sm border border-slate-100 active:scale-95 transition-transform cursor-pointer"
            (click)="goToCatalog(c.id)">

            <div class="w-10 h-10 mx-auto rounded-2xl bg-[#173A7A]/10 flex items-center justify-center text-lg mb-2">
              {{ c.icon }}
            </div>
            <div class="text-[11px] font-medium text-slate-700 leading-tight">
              {{ c.name }}
            </div>
          </div>
        </div>

        <!-- ТОП ПРОДАЖ -->
        <div class="flex items-center justify-between mb-3">
          <h3 class="font-bold text-slate-900">Топ продаж</h3>
          <span class="text-sm text-[#173A7A] font-semibold">Ещё</span>
        </div>

        <div class="space-y-3 mb-8">
          <div *ngFor="let p of products$ | async"
            class="bg-white rounded-3xl p-3 shadow-sm border border-slate-100 flex gap-3" (click)="goToProduct(p.id)">
            <!-- карточка товара -->
            <img [src]="p.image" class="w-20 h-20 rounded-2xl object-cover" />
            <div class="flex-1">
              <div class="flex items-start justify-between gap-2">
                <div class="text-sm font-semibold text-slate-900 leading-tight">{{ p.name }}</div>
                <div class="bg-[#FFD54F] text-[10px] font-bold px-2 py-1 rounded-full whitespace-nowrap">
                  {{ p.badge }}
                </div>
              </div>
              <div class="text-xs text-slate-500 mt-1">{{ p.category }}</div>
              <div class="mt-3 flex items-center justify-between">
                <div class="text-base font-bold text-[#173A7A]">{{ p.price }}</div>
                <div class="text-[11px] text-slate-400 line-through">{{ p.oldPrice }}</div>
              </div>
            </div>
          </div>
        </div>

        <!-- НОВИНКИ -->
        <div class="flex items-center justify-between mb-3">
          <h3 class="font-bold text-slate-900">Новинки</h3>
          <span class="text-sm text-[#173A7A] font-semibold">Ещё</span>
        </div>

        <div class="space-y-3">
          <div *ngFor="let p of products$ | async"
            class="bg-white rounded-3xl p-3 shadow-sm border border-slate-100 flex gap-3" (click)="goToProduct(p.id)">
            <!-- та же карточка товара -->
            <img [src]="p.image" class="w-20 h-20 rounded-2xl object-cover" />
            <div class="flex-1">
              <div class="flex items-start justify-between gap-2">
                <div class="text-sm font-semibold text-slate-900 leading-tight">{{ p.name }}</div>
                <div class="bg-[#FFD54F] text-[10px] font-bold px-2 py-1 rounded-full whitespace-nowrap">
                  {{ p.badge }}
                </div>
              </div>
              <div class="text-xs text-slate-500 mt-1">{{ p.category }}</div>
              <div class="mt-3 flex items-center justify-between">
                <div class="text-base font-bold text-[#173A7A]">{{ p.price }}</div>
                <div class="text-[11px] text-slate-400 line-through">{{ p.oldPrice }}</div>
              </div>
            </div>
          </div>
        </div>

      </div> <!-- конец px-4 pt-3 pb-6 -->
    </div> <!-- конец PHONE FRAME -->
  </div> <!-- конец GRID -->
</ion-content>
