<ion-content>
  <div class="min-h-full w-full flex justify-center bg-slate-50">
    <div class="w-full max-w-md bg-white shadow-xl border border-slate-100">

      <!-- HEADER -->
      <div class="px-4 py-4 border-b border-slate-100 flex items-center justify-between">
        <h1 class="text-lg font-bold text-slate-900">Избранное</h1>

        <div class="text-sm text-slate-400">
          {{ favorites()!.length }} товаров
        </div>
      </div>

      <!-- EMPTY -->
      <div
        *ngIf="favorites().length === 0"
        class="flex flex-col items-center justify-center py-20 text-center"
      >
        <div class="text-4xl mb-3">💔</div>
        <div class="text-slate-500 text-sm">
          У вас пока нет избранных товаров
        </div>
      </div>

      <!-- LIST -->
      <div class="p-4 space-y-3" *ngIf="favorites().length > 0">
        <div
          *ngFor="let p of favorites()"
          class="bg-white rounded-3xl p-3 shadow-sm border border-slate-100 flex gap-3"
        >
          <img
            [src]="p.product.image"
            class="w-20 h-20 rounded-2xl object-cover"
          />

          <div class="flex-1">
            <div class="flex items-start justify-between">
              <div class="!text-sm !font-semibold !text-slate-900">
                {{ p.product.title }}
              </div>

              <button
                (click)="remove(p.id)"
                class="!text-red-500 !text-xs"
              >
                ✕
              </button>
            </div>

            <div class="!text-xs !text-slate-500 !mt-1">
              {{ p.product.category }}
            </div>

            <div class="mt-3 flex items-center justify-between">
              <div class="text-base font-bold text-[#173A7A]">
                {{ p.product.price }} ₽
              </div>

             
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</ion-content>
