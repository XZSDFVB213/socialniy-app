<div
  *ngIf="favorites().length === 0"
  class="flex flex-col items-center justify-center py-20 text-center"
>
  <div class="text-4xl mb-3">💔</div>

  <div class="text-slate-500 text-sm">У вас пока нет избранных товаров</div>
</div>

<div class="p-4 space-y-3">
  <div *ngFor="let p of favorites()" class="relative overflow-hidden rounded-3xl">
    <!-- DELETE BG -->
    <div class="absolute inset-0 bg-red-500 flex items-center justify-end pr-6">
      <div class="text-white text-2xl">🗑</div>
    </div>

    <!-- CARD -->
    <div
      class="bg-white rounded-3xl p-3 flex gap-3 relative z-10"
      [style.transform]="getTransform(p.id)"
      [style.transition]="getTransition(p.id)"
      (touchstart)="onTouchStart($event, p.id)"
      (touchmove)="onTouchMove($event, p.id)"
      (touchend)="onTouchEnd(p.id)"
    >
      <div class="bg-white rounded-3xl p-3 w-full flex gap-3">
        <img [src]="p.product.image" class="w-20 h-20 rounded-2xl object-cover" />

        <div class="flex-1">
          <div class="flex items-start justify-between">
            <div class="!text-sm !font-semibold !text-slate-900">
              {{ p.product.title }}
            </div>

            <button (click)="remove(p.id)" class="!text-red-500 !text-2xl">✕</button>
          </div>

          <div class="!text-xs !text-slate-500 !mt-1">
            {{ p.product.category }}
          </div>

          <div class="mt-3 flex items-center justify-between">
            <div class="text-base font-bold text-[#173A7A]">{{ p.product.price }} ₽</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
