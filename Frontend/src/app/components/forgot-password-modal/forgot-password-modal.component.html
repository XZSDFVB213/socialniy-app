<ion-header>
  <ion-toolbar>
    <ion-title>Восстановление пароля</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="dismiss()">✕</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <!-- Шаг 1: Ввод телефона -->
  <ng-container *ngIf="!stepTwo">
    <div class="ion-text-center mb-6">
      <h2>Забыли пароль?</h2>
      <p>Введите номер телефона</p>
    </div>

    <ion-input
      type="mail"
      placeholder="mail@mail.ru"
      [(ngModel)]="email"
      class="inputs"
      clearInput="true"
      [clearInput]="true"
    >
    </ion-input>

    <ion-button expand="block" (click)="sendCode()" [disabled]="loading || !email" class="mt-4">
      {{ loading ? 'Отправка...' : 'Получить код' }}
    </ion-button>
  </ng-container>

  <!-- Шаг 2: Ввод кода и нового пароля -->
  <ng-container *ngIf="stepTwo">
    <p class="ion-text-center mb-4">
      Код отправлен на <strong>{{ email }}</strong>
    </p>

    <ion-input
      type="text"
      maxlength="4"
      placeholder="1234"
      [(ngModel)]="code"
      class="inputs mb-4"
      clearInput="true"
    >
    </ion-input>

    <ion-input
      type="password"
      placeholder="Новый пароль"
      [(ngModel)]="newPassword"
      class="inputs mb-4"
    >
    </ion-input>

    <ion-input
      type="password"
      placeholder="Повторите новый пароль"
      [(ngModel)]="confirmPassword"
      class="inputs mb-6"
    >
    </ion-input>

    <ion-button
      expand="block"
      (click)="resetPassword()"
      [disabled]="loading || !code || !newPassword"
    >
      {{ loading ? 'Сохранение...' : 'Сменить пароль' }}
    </ion-button>

    <div class="ion-text-center mt-4">
      <ion-button fill="clear" size="small" (click)="resendCode()" [disabled]="timer > 0">
        {{ timer > 0 ? `Повторно через ${timer} сек` : 'Отправить код повторно' }}
      </ion-button>
    </div>
  </ng-container>

  <ion-text color="danger" class="block ion-text-center mt-4" *ngIf="error">
    {{ error }}
  </ion-text>
</ion-content>
